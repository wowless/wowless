                type:
                  taggedunion:
                    alias: tag
                    checknumber: tag
                    exact: tag
                    isstring: tag
                    noneornil_error: tag
                    nonnilvalue_error: tag
                    per_type: tag
                    upvalue_luaobject: tag
                    upvalue_stringenum: tag
                    upvalue_uiobject: tag
