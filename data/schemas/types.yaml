            record:
              kind:
                required: true
                type:
                  taggedunion:
                    also_string: tag
                    noop: tag
        c_output:
          type:
            record:
              type:
                type:
                  literal: parameterized
        default:
          type: any
        implicitly_nilable:
          type: flag
        lua_kind:
